<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirthdayBell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #2c2c2c;
      background: #f5f7f5;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .site-header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid #d4e6ce;
    }

    .app-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6b8f71;
      margin-bottom: 8px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 300;
      color: #1a1a1a;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #6b8f71;
    }

    p {
      color: #3a3a3a;
    }

    a {
      color: #6b8f71;
      text-decoration: underline;
    }

    a:hover {
      color: #4a6e4f;
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="site-header">
      <p class="app-name">BirthdayBell</p>
      <h1 class="page-title">BirthdayBell</h1>
    </header>

    <section>
      <h2>Support</h2>
      <br>
      <p>For any issues with BirthdayBell please email the developer at <a href="mailto:damianharvey@gmail.com">damianharvey@gmail.com</a></p>
    </section>

  </div>
</body>
</html>
