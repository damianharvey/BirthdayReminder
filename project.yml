name: BirthdayReminder
options:
  bundleIdPrefix: com.birthdayreminder
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  BirthdayReminder:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BirthdayReminder
        excludes:
          - "**/*.md"
    info:
      path: BirthdayReminder/Info.plist
      properties:
        CFBundleDisplayName: BirthdayReminder
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSContactsUsageDescription: "Used to import friends' birthdays and contact details."
        NSUserNotificationsUsageDescription: "Used to remind you about upcoming birthdays."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birthdayreminder.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
